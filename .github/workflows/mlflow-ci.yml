name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: iterative/setup-cml@v2

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: make install

      - name: Format
        run: make format

      - name: Train model
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: make train

      - name: Validate model
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: make validate

      - name: Evaluation report (CML)
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make eval

      - name: Update branch with results
        env:
          NAME: ${{ secrets.USER_NAME }}
          EMAIL: ${{ secrets.USER_EMAIL }}
        run: make update-branch USER_NAME="${NAME:-github-actions}" USER_EMAIL="${EMAIL:-github-actions@github.com}"

      - name: Copy model to Model folder
        run: mkdir -p Model && cp model.pkl Model/model.pkl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            Model/model.pkl
            mlflow.db
            Results/
          retention-days: 30
